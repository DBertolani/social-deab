<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  
  <!-- IDs para injeção dinâmica via JS -->
  <title id="meta-title">Central de Rastreio</title>
  <meta id="meta-desc" name="description" content="Acompanhe sua entrega."/>
  
  <!-- OG Tags para WhatsApp/Facebook -->
  <meta property="og:type" content="website" />
  <meta id="og-url" property="og:url" content="" />
  <meta id="og-title" property="og:title" content="Central de Rastreio" />
  <meta id="og-desc" property="og:description" content="Acompanhe sua entrega." />
  <meta id="og-image" property="og:image" content="" />
  
  <meta name="theme-color" content="#2563eb" id="meta-theme">
  <meta name="robots" content="noindex,nofollow"/>

  <link rel="icon" id="dynamic-favicon" href="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    :root {
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --primary: #2563eb; /* Será alterado dinamicamente via JS */
      --primary-light: #eff6ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #ca8a04;
      --warning-light: #fef9c3;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--card-bg);
      padding: 20px 0;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
      overflow: hidden;
    }
    
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
    }

    p.subtitle {
      margin: 2px 0 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .search-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .input-group {
      display: grid;
      gap: 12px;
    }

    input, button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    input {
      border: 1px solid var(--border);
      background: #f9fafb;
    }
    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    button {
      border: none;
      background: var(--text-main);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #000; }
    
    button.refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 8px 16px;
      font-size: 13px;
      width: auto;
    }
    button.refresh-btn:hover { background: #f3f4f6; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px dashed var(--border);
    }

    .tracking-code {
      font-family: monospace;
      font-size: 15px;
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .timeline {
      position: relative;
      padding-left: 20px;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 10px;
      bottom: 20px;
      width: 2px;
      background: #e5e7eb;
      border-radius: 2px;
    }

    .event {
      position: relative;
      padding-left: 25px;
      padding-bottom: 32px;
    }

    .event:last-child { padding-bottom: 0; }

    .dot {
      position: absolute;
      left: -20px;
      top: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #d1d5db;
      z-index: 2;
    }

    .event.latest .dot {
      border-color: var(--success);
      background: var(--success);
      box-shadow: 0 0 0 4px var(--success-light);
      animation: pulse 2s infinite;
    }
    
    .event.latest .ev-title { color: var(--success); }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(22, 163, 74, 0); }
      100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
    }

    .ev-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .ev-title {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.4;
    }

    .ev-date {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      background: #fff;
      padding-left: 8px;
    }

    .ev-detail {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    .ev-location {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 12px;
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 6px;
      color: var(--text-main);
      font-weight: 500;
    }

    .msg-box { padding: 16px; border-radius: 8px; margin-top: 16px; font-size: 14px; text-align: center; }
    .msg-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .msg-info { color: var(--text-muted); }
    
    .hidden { display: none; }
    
    .config-box {
      margin-top: 20px;
      padding: 15px;
      border: 1px dashed var(--warning);
      background: var(--warning-light);
      border-radius: 8px;
    }
    .config-box input { margin-bottom: 8px; }

    @media(min-width: 600px) {
      .input-group { grid-template-columns: 1fr auto; }
    }
      
  .btn-external {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .btn-external:hover { background: #000; color: #fff; }

.loader-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 0;
  color: var(--primary);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--primary-light);
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-content">
      <div class="logo-icon" id="loja-logo-container">
        <i class="bi bi-box-seam"></i>
      </div>
      <div>
        <h1 id="loja-titulo-header">Central de Rastreio</h1>
        <p class="subtitle" id="loja-subtitulo-header">Acompanhe seu pedido em tempo real</p>
      </div>
    </div>
  </div>
</header>

<div class="container">
  
<div class="search-card">
  <div class="input-group">
    <input id="code" placeholder="Ex: AA123456789BR ou código Jadlog">
    <button onclick="consultar()"><i class="bi bi-search"></i> Buscar</button>
  </div>

  <div id="saida"></div>

  <div id="boxScript" class="config-box hidden">
    <p style="margin:0 0 8px 0; font-size:13px; font-weight:bold">Configuração Inicial</p>
    <input id="script" placeholder="Cole a URL do seu WebApp">
    <button onclick="salvarScript()">Salvar</button>
  </div>
</div>

  <div id="resultado-container" class="search-card hidden"></div>
  
  <p style="text-align:center; font-size:12px; color:#9ca3af; margin-top:30px;">
    Rastreamento seguro e sem anúncios.
  </p>

</div>

<script>
  const LS_KEY = "SCRIPT_URL";

  // --- FUNÇÕES DE UTILIDADE E CONFIGURAÇÃO ---
  function getIconeStatus(status) {
    const s = status.toLowerCase();
    if (s.includes('entregue')) return '<i class="bi bi-check-circle-fill"></i>';
    if (s.includes('saiu') || s.includes('caminho')) return '<i class="bi bi-truck"></i>';
    if (s.includes('postado')) return '<i class="bi bi-box-seam"></i>';
    if (s.includes('aguardando')) return '<i class="bi bi-clock-history"></i>';
    if (s.includes('fiscaliza')) return '<i class="bi bi-shield-exclamation"></i>';
    return '<i class="bi bi-record-circle"></i>';
  }

  function qs(name){
    const u = new URL(location.href);
    return u.searchParams.get(name);
  }

  function salvarScript(){
    const v = (document.getElementById("script").value || "").trim();
    if (!v) return;
    localStorage.setItem(LS_KEY, v);
    document.getElementById("boxScript").classList.add("hidden");
    inicializarIdentidadeLoja();
    consultar();
  }

  async function carregarConfigAuto(){
    const scriptParam = qs("script");
    if (scriptParam) {
      const v = decodeURIComponent(scriptParam).trim();
      if (v) { localStorage.setItem(LS_KEY, v); return v; }
    }
    const ls = (localStorage.getItem(LS_KEY) || "").trim();
    if (ls) return ls;

    try {
      const r = await fetch(new URL("config.json", location.href).toString(), {cache:"no-store"});
      if (r.ok) {
        const j = await r.json();
        const v = (j && j.SCRIPT_URL) ? String(j.SCRIPT_URL).trim() : "";
        if (v) { localStorage.setItem(LS_KEY, v); return v; }
      }
    } catch(e){}
    return "";
  }

  // --- LÓGICA DE IDENTIDADE (WHITE LABEL) ---
// --- LÓGICA DE IDENTIDADE (WHITE LABEL) ---
  function aplicarIdentidadeLoja(loja) {
    if (!loja) return;
    
    // Cores
    if (loja.corPrimaria) {
      document.documentElement.style.setProperty('--primary', loja.corPrimaria);
      document.documentElement.style.setProperty('--primary-light', loja.corPrimaria + "1A"); 
      document.querySelector('meta[name="theme-color"]').setAttribute("content", loja.corPrimaria);
    }
    
    // Textos e Meta Tags
    if (loja.nomeLoja) {
      document.title = `Central de Rastreio | ${loja.nomeLoja}`;
      document.getElementById("loja-titulo-header").textContent = loja.nomeLoja;
      document.getElementById("meta-title").textContent = loja.nomeLoja;
      document.getElementById("og-title").setAttribute("content", loja.nomeLoja);
    }
    
    if (loja.descricaoLoja) {
      document.getElementById("loja-subtitulo-header").textContent = loja.descricaoLoja;
      document.getElementById("meta-desc").setAttribute("content", loja.descricaoLoja);
      document.getElementById("og-desc").setAttribute("content", loja.descricaoLoja);
    }
    
    // Logo
    if (loja.logoLoja) {
      const imgContainer = document.getElementById("loja-logo-container");
      imgContainer.innerHTML = `<img src="${loja.logoLoja}" alt="Logo">`;
      imgContainer.style.background = "transparent";
      imgContainer.style.boxShadow = "none";
      document.getElementById("og-image").setAttribute("content", loja.logoLoja);
    }

    // Favicon Dinâmico com quebra de cache severa (Força o navegador a mudar na hora)
    if (loja.favicon) {
       let urlFaviconFinal = loja.favicon.includes("drive.google.com") 
          ? "https://drive.google.com/thumbnail?id=" + extrairIdDriveConfigFrontend(loja.favicon) + "&sz=w64" 
          : loja.favicon;

       // Remove a tag antiga se houver para evitar travas do navegador
       const antigoFavicon = document.getElementById("dynamic-favicon") || document.querySelector('link[rel="icon"]');
       if (antigoFavicon) antigoFavicon.remove();

       // Cria uma tag novinha em folha injetando uma versão única baseada no tempo
       const novoFavicon = document.createElement('link');
       novoFavicon.id = "dynamic-favicon";
       novoFavicon.rel = "icon";
       novoFavicon.type = "image/png";
       novoFavicon.href = urlFaviconFinal + (urlFaviconFinal.includes('?') ? '&' : '?') + "v=" + new Date().getTime();
       document.getElementsByTagName('head')[0].appendChild(novoFavicon);
    }
    
    document.getElementById("og-url").setAttribute("content", window.location.href);
  }

async function inicializarIdentidadeLoja() {
    const script = await carregarConfigAuto();
    if (!script) return;
    try {
      const response = await fetch(script + "?rota=config", { cache: "no-store" });
      const loja = await response.json();
      aplicarIdentidadeLoja({
        nomeLoja: loja["NomeDaLoja"] || loja["NomeDoSite"],
        logoLoja: loja["LogoDoSite"] ? (loja["LogoDoSite"].includes("drive.google.com") ? "https://drive.google.com/thumbnail?id=" + extrairIdDriveConfigFrontend(loja["LogoDoSite"]) + "&sz=w400" : loja["LogoDoSite"]) : "",
        favicon: loja["Favicon"] || loja["LogoDoSite"],
        corPrimaria: loja["CorPrimaria"] || loja["CorDoSite"],
        descricaoLoja: loja["DescricaoDoSite"]
      });
    } catch (e) { console.error("Erro ao carregar configs da planilha", e); }
  }

  function extrairIdDriveConfigFrontend(url) {
    if (!url) return "";
    if (url.indexOf('id=') >= 0) return (url.split('id=')[1]).split('&')[0];
    let parts = url.split('/');
    let viewIndex = parts.indexOf('view');
    if (viewIndex > -1) return parts[viewIndex - 1];
    return parts[5] || "";
  }

  // --- LÓGICA DE RASTREIO (ORIGINAL) ---
  function formatarDataBR(dtStr){
    if(!dtStr) return "—";
    try{
      const s = String(dtStr).replace(" ", "T").replace(".000000","") + "-03:00";
      const d = new Date(s);
      if (isNaN(d.getTime())) return dtStr;
      return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit" }) + " às " + 
             d.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" });
    }catch(e){
      return dtStr;
    }
  }

  function validarCodigo(code){ return code.length >= 5; }

  function renderTimeline(eventos, isExternal){
    if(isExternal) return ''; 
    if(!eventos || !eventos.length){
      return `<div class="msg-box msg-info">
                <i class="bi bi-box-seam" style="font-size: 24px; color: var(--primary); display:block; margin-bottom: 10px;"></i>
                <strong>Objeto postado recentemente!</strong><br>
                O sistema da transportadora leva algumas horas para sincronizar o status. Tente atualizar mais tarde.
              </div>`;
    }
    const htmlEventos = eventos.map((ev, idx) => {
      const isLatest = idx === 0; 
      const icon = getIconeStatus(ev.status || "");
      return `
        <div class="event ${isLatest ? 'latest' : ''}">
          <div class="dot"></div>
          <div class="ev-header">
            <div class="ev-title">${isLatest ? icon : ''} ${ev.status || ""}</div>
            <div class="ev-date">${formatarDataBR(ev.data)}</div>
          </div>
          ${ev.detalhe ? `<div class="ev-detail">${ev.detalhe}</div>` : ""}
          <div class="ev-place-wrapper">
             ${ev.origem ? `<div class="ev-location"><i class="bi bi-geo-alt"></i> ${ev.origem} ${ev.destino ? ' ➔ ' + ev.destino : ''}</div>` : ""}
          </div>
        </div>
      `;
    }).join("");
    return `<div class="timeline">${htmlEventos}</div>`;
  }
  
  async function consultar() {
    const saida = document.getElementById("saida");
    const containerRes = document.getElementById("resultado-container");
    saida.innerHTML = `<div class="loader-wrapper"><div class="spinner"></div><p>Consultando status...</p></div>`;
    containerRes.classList.add("hidden");
    containerRes.innerHTML = "";

    const idEl = document.getElementById("id");
    let id = idEl ? idEl.value.trim() : "";
    let code = (document.getElementById("code").value || "").trim().toUpperCase();

    const idParam = qs("id");
    const codeParam = qs("code");
    if (!id && idParam) id = String(idParam).trim();
    if (!code && codeParam) code = String(codeParam).trim().toUpperCase();

    if (!id && !code) { saida.innerHTML = ""; return; }

    const script = await carregarConfigAuto();
    if (!script) {
      document.getElementById("boxScript").classList.remove("hidden");
      saida.innerHTML = "";
      return;
    }

    try {
      if (id && !code) {
        const url1 = script + "?rota=rastreio&id=" + encodeURIComponent(id);
        const r1 = await fetch(url1, { cache: "no-store" });
        const j1 = await r1.json();
        if (j1.ok && j1.tracking) {
          code = String(j1.tracking).trim().toUpperCase();
          document.getElementById("code").value = code;
        }
      }

      const url2 = script + "?rota=rastreio_wonca&code=" + encodeURIComponent(code);
      const r2 = await fetch(url2, { cache: "no-store" });
      const j2 = await r2.json();

      if (!j2.ok) {
        saida.innerHTML = `<div class="msg-box msg-error">Não foi possível rastrear: ${j2.erro || "Código não encontrado"}</div>`;
        return;
      }

      // Aplica identidade branding se vier no retorno
      if (j2.loja) aplicarIdentidadeLoja(j2.loja);

      const novaUrl = window.location.origin + window.location.pathname + "?code=" + encodeURIComponent(code);
      window.history.pushState({ path: novaUrl }, '', novaUrl);

      const eventos = j2.eventos || [];
      saida.innerHTML = "";
      const urlRastreioOficial = j2.link_oficial || j2.link_rastreio || `https://linketrack.com/track?utm_source=plataforma&codigo=${code}`;

      let botoesAcao = j2.is_external ? 
        `<div style="text-align:center; margin-bottom:20px; display: flex; justify-content: center; gap: 10px;">
          <a href="${urlRastreioOficial}" target="_blank" class="btn-external"> <i class="bi bi-box-arrow-up-right"></i> Tela Cheia</a>
          <button onclick="compartilharWhatsApp('${j2.codigo || code}', 'link')" class="btn-external" style="background: #25d366;"><i class="bi bi-whatsapp"></i> Compartilhar Link</button>
        </div>` :
        `<div style="text-align:center; margin-bottom:20px;">
          <button onclick="compartilharWhatsApp('${j2.codigo || code}', '${eventos.length ? eventos[0].status : "Em trânsito"}')" class="btn-external" style="background: #25d366; border: none;"><i class="bi bi-whatsapp"></i> Compartilhar Status</button>
        </div>`;

      containerRes.innerHTML = `
        <div class="result-header">
           <span class="tracking-code"><i class="bi bi-upc-scan"></i> ${j2.codigo || code}</span>
           <button class="refresh-btn" onclick="consultar()"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        ${botoesAcao}
        ${j2.is_external ? `<div style="margin-bottom:20px;"><div style="height: 600px; overflow: hidden; border: 1px solid var(--border); border-radius: 12px; background: #fff;"><iframe src="${urlRastreioOficial}" style="width:100%; height:100%; border: none;"></iframe></div></div>` : renderTimeline(eventos, j2.is_external)}
      `;
      containerRes.classList.remove("hidden");
    } catch (e) {
      saida.innerHTML = `<div class="msg-box msg-error">Erro de conexão: ${e.message}</div>`;
    }
  }

  function compartilharWhatsApp(codigo, status) {
    const linkRastreio = window.location.origin + window.location.pathname + "?code=" + codigo;
    const mensagem = status === 'link' ? `Olá! Acompanhe a entrega do seu pedido ${codigo} aqui: ${linkRastreio}` : `Olá! O status do seu pedido ${codigo} é: *${status}*. Acompanhe aqui: ${linkRastreio}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(mensagem)}`, '_blank');
  }

  window.addEventListener('load', function() {
    inicializarIdentidadeLoja(); 
    if (qs("code") || qs("id")) consultar();
  });
</script>
</body>
</html>
